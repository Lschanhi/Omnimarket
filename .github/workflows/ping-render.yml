name: Keep Render API Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping OmniMarket API Health Endpoint
        run: |
          echo "Pingando API..."
          curl -L --fail --silent --show-error \
            https://omnimarket-uom9.onrender.com/health

      - name: Log Success
        run: echo "API respondeu com sucesso."
